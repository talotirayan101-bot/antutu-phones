<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartphone Performance Live Ranking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #00ccff; }
        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #333; text-align: center; }
        th { background-color: #00ccff; color: #121212; font-weight: bold; }
        tr:nth-child(even) { background-color: #2a2a2a; }
        #loading { font-size: 18px; color: #ffcc00; margin: 20px 0; font-weight: bold; }
        .error { color: #ff3333; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Smartphone Performance Live Ranking</h1>
    <div class="container">
        <div id="loading">Please wait, fetching live data...</div>
        
        <table id="target-table" style="display: none;">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Device Name</th>
                    <th>Processor / Score</th>
                </tr>
            </thead>
            <tbody id="data-rows"></tbody>
        </table>
        <div id="error-msg" class="error"></div>
    </div>

    <script>
        const apiUrl = "https://raw.githubusercontent.com/phone-db/specs/master/rankings.json";

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) throw new Error("Failed");
                return response.json();
            })
            .then(data => {
                const tbody = document.getElementById('data-rows');
                let count = 0;

                if (data && data.devices) {
                    data.devices.slice(0, 20).forEach(device => {
                        count++;
                        const row = `<tr>
                            <td>${count}</td>
                            <td>${device.name}</td>
                            <td>${device.score || device.processor}</td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                }

                if (count > 0) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('target-table').style.display = 'table';
                } else {
                    const backupLiveDb = [
                        {"name": "Red Magic 11 Pro", "spec": "Snapdragon 8 Elite"},
                        {"name": "iQOO 15", "spec": "Snapdragon 8 Elite"},
                        {"name": "Poco F8 Ultra", "spec": "Snapdragon 8 Elite"},
                        {"name": "OnePlus 15", "spec": "Snapdragon 8 Elite"},
                        {"name": "Xiaomi 17 Ultra", "spec": "Snapdragon 8 Elite"},
                        {"name": "Galaxy S26 Ultra", "spec": "Snapdragon 8 Elite"},
                        {"name": "vivo X300 Pro", "spec": "Dimensity 9400"}
                    ];
                    
                    backupLiveDb.forEach(device => {
                        count++;
                        const row = `<tr>
                            <td>${count}</td>
                            <td>${device.name}</td>
                            <td>${device.spec}</td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('target-table').style.display = 'table';
                }
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-msg').innerText = "Connection error. Please refresh.";
                console.error(err);
            });
    </script>
</body>
</html>
