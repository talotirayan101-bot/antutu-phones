<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnTuTu Live Ranking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #ff4500; }
        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #333; text-align: center; }
        th { background-color: #ff4500; color: #ffffff; }
        tr:nth-child(even) { background-color: #2a2a2a; }
        #loading { font-size: 18px; color: #ffcc00; margin: 20px 0; font-weight: bold; }
        .error { color: #ff3333; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>AnTuTu Smartphone Live Ranking</h1>
    <div class="container">
        <div id="loading">⏳ Please wait, fetching live data from official website...</div>
        
        <table id="target-table" style="display: none;">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Device Name</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="data-rows"></tbody>
        </table>
        <div id="error-msg" class="error"></div>
    </div>

    <script>
        const targetUrl = "https://antutu.com/web/ranking";
        const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetUrl);

        fetch(proxyUrl)
            .then(response => {
                if (!response.ok) throw new Error("Network connection failed");
                return response.json();
            })
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, "text/html");
                
                // استهداف دقيق جداً للعناصر بناءً على الكود المصدري لصفحة الأندرويد الحالية
                const rankItems = doc.querySelectorAll('.ranking-list li, .rank-list li, .rank-list-ul li, [class*="rank"] li');
                const tbody = document.getElementById('data-rows');
                
                let count = 0;
                if (rankItems && rankItems.length > 0) {
                    rankItems.forEach((item) => {
                        try {
                            const nameEl = item.querySelector('.name') || item.querySelector('.title') || item.querySelector('div:nth-child(2)');
                            const scoreEl = item.querySelector('.score') || item.querySelector('.total-score') || item.querySelector('.score-num');
                            
                            if (nameEl && scoreEl) {
                                const name = nameEl.textContent.trim();
                                const score = scoreEl.textContent.trim();
                                
                                if (name && score && score !== "0") {
                                    count++;
                                    const row = `<tr>
                                        <td>${count}</td>
                                        <td>${name}</td>
                                        <td>${score}</td>
                                    </tr>`;
                                    tbody.innerHTML += row;
                                }
                            }
                        } catch (e) {
                            console.error(e);
                        }
                    });
                }

                if (count > 0) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('target-table').style.display = 'table';
                } else {
                    throw new Error("Could not parse data fields from live response");
                }
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-msg').innerText = "Live fetch failed or blocked by Cloudflare. Please check proxy stability.";
                console.error(err);
            });
    </script>
</body>
</html>
