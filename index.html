<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartphone Performance Live Ranking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #00ccff; }
        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #333; text-align: center; }
        th { background-color: #00ccff; color: #121212; font-weight: bold; }
        tr:nth-child(even) { background-color: #2a2a2a; }
    </style>
</head>
<body>

    <h1>Smartphone Performance Live Ranking</h1>
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Device Name</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="data-rows"></tbody>
        </table>
    </div>

    <script>
        const devicesData = [
            {"rank": "1", "name": "Red Magic 11 Pro", "score": "3,981,427"},
            {"rank": "2", "name": "iQOO 15", "score": "3,740,528"},
            {"rank": "3", "name": "Poco F8 Ultra", "score": "3,640,351"},
            {"rank": "4", "name": "OnePlus 15", "score": "3,621,671"},
            {"rank": "5", "name": "Xiaomi 17 Ultra", "score": "3,593,401"},
            {"rank": "6", "name": "Galaxy S26 Ultra", "score": "3,515,964"},
            {"rank": "7", "name": "vivo X300 Pro", "score": "3,269,794"}
        ];

        const tbody = document.getElementById('data-rows');
        
        devicesData.forEach(device => {
            const row = `<tr>
                <td>${device.rank}</td>
                <td>${device.name}</td>
                <td>${device.score}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    </script>
</body>
</html>
