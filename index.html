<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnTuTu Live Ranking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #ff4500; }
        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #333; text-align: center; }
        th { background-color: #ff4500; color: #ffffff; }
        tr:nth-child(even) { background-color: #2a2a2a; }
        #loading { font-size: 18px; color: #ffcc00; margin: 20px 0; font-weight: bold; }
        .error { color: #ff3333; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>AnTuTu Smartphone Live Ranking</h1>
    <div class="container">
        <div id="loading">⏳ Please wait, fetching live data from official website...</div>
        
        <table id="target-table" style="display: none;">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Device Name</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="data-rows"></tbody>
        </table>
        <div id="error-msg" class="error"></div>
    </div>

    <script>
        const targetUrl = "https://www.antutu.com/en/ranking/rank1.htm";
        const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetUrl);

        fetch(proxyUrl)
            .then(response => {
                if (!response.ok) throw new Error("Connection failed");
                return response.json();
            })
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, "text/html");
                const rankItems = doc.querySelectorAll('.rank-list li, ul.rank-list-ul li, .b-line, tr');
                const tbody = document.getElementById('data-rows');
                
                if (rankItems && rankItems.length > 0) {
                    let count = 0;
                    rankItems.forEach((item) => {
                        try {
                            const nameEl = item.querySelector('.name') || item.querySelector('.title') || item.querySelector('.con .title');
                            const scoreEl = item.querySelector('.score');
                            
                            if (nameEl && scoreEl) {
                                count++;
                                const name = nameEl.textContent.trim();
                                const score = scoreEl.textContent.trim();
                                
                                const row = `<tr>
                                    <td>${count}</td>
                                    <td>${name}</td>
                                    <td>${score}</td>
                                </tr>`;
                                tbody.innerHTML += row;
                            }
                        } catch (e) {
                            console.error(e);
                        }
                    });

                    if (count > 0) {
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('target-table').style.display = 'table';
                    } else {
                        throw new Error("No matching elements found");
                    }
                } else {
                    throw new Error("Structure changed");
                }
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-msg').innerText = "Error loading live data. Please refresh the page.";
                console.error(err);
            });
    </script>
</body>
</html>
